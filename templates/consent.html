<!doctype html><html><head><meta charset="utf-8"><title>e-Consent</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4"><div class="container"><h2>Informed Consent for Living Donor</h2>
<p>Please read and sign.</p>
<form method="POST" action="/donor/consent/submit">
  <div class="mb-3"><label>Full name (signature)</label><input name="signed_name" class="form-control" required></div>
  <div class="mb-3 form-check"><input name="agree" value="yes" class="form-check-input" type="checkbox" id="agree" required><label class="form-check-label" for="agree">I agree</label></div>
  <button class="btn btn-primary" type="submit">Sign</button>
</form><hr><a href="/">Home</a></div></body></html>
