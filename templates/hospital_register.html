<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Registration </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5568d3 0%, #683a92 100%);
        }

        h2 {
            color: #333;
            font-weight: bold;
        }

        .form-label {
            color: #555;
            font-weight: 500;
        }

        .hospital-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body p-5">
                        <div class="text-center">
                            <div class="hospital-icon">🏥</div>
                            <h2>Hospital Registration</h2>
                            <p class="text-muted">Register your hospital to manage organ donations</p>
                        </div>

                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'danger' else 'warning' if category == 'warning' else 'success' if category == 'success' else 'info' }} alert-dismissible fade show"
                            role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endfor %}
                        {% endif %}
                        {% endwith %}

                        <form method="POST" action="/hospital/register">
                            <div class="mb-3">
                                <label class="form-label" for="hospital-name">🏢 Hospital Name</label>
                                <input id="hospital-name" type="text" name="hospital_name" class="form-control"
                                    placeholder="Enter hospital name" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="registration-number">📋 Registration Number</label>
                                <input id="registration-number" type="text" name="registration_number"
                                    class="form-control" placeholder="Medical Council registration number" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label" for="hospital-mobile">📱 Mobile Number</label>
                                    <input id="hospital-mobile" type="tel" name="mobile" class="form-control"
                                        placeholder="10-digit mobile" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label" for="hospital-email">📧 Email</label>
                                    <input id="hospital-email" type="email" name="email" class="form-control"
                                        placeholder="hospital@email.com" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="hospital-address">📍 Address</label>
                                <input id="hospital-address" type="text" name="address" class="form-control"
                                    placeholder="Hospital address" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label" for="hospital-city">🏙️ City</label>
                                    <input id="hospital-city" type="text" name="city" class="form-control"
                                        placeholder="City" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label" for="hospital-state">🗺️ State</label>
                                    <input id="hospital-state" type="text" name="state" class="form-control"
                                        placeholder="State" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="hospital-password">🔐 Password</label>
                                <input id="hospital-password" type="password" name="password" class="form-control"
                                    placeholder="Secure password" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="hospital-confirm-password">✓ Confirm Password</label>
                                <input id="hospital-confirm-password" type="password" name="confirm_password"
                                    class="form-control" placeholder="Confirm password" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Register Hospital</button>
                        </form>

                        <p class="text-center text-muted mt-3">
                            Already registered? <a href="/hospital/login" class="text-primary fw-bold">Login here</a>
                        </p>
                        <p class="text-center text-muted">
                            <a href="/" class="text-secondary">Back to Home</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            /* ---------------------------
               Capitalize while typing
            ---------------------------- */
            function capitalizeWords(input) {
                const cursorPos = input.selectionStart;
                input.value = input.value
                    .toLowerCase()
                    .replace(/\b\w/g, c => c.toUpperCase());
                input.setSelectionRange(cursorPos, cursorPos);
            }

            ["hospital-name", "hospital-address", "hospital-city", "hospital-state"]
                .forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.addEventListener("input", function () {
                            capitalizeWords(this);
                        });
                    }
                });

            /* ---------------------------
               Registration Number
               Exactly 5 digits
            ---------------------------- */
            document.getElementById("registration-number")
                .addEventListener("input", function () {
                    this.value = this.value.replace(/\D/g, "").slice(0, 5);
                });

            /* ---------------------------
               Mobile Number
               Exactly 10 digits
            ---------------------------- */
            document.getElementById("hospital-mobile")
                .addEventListener("input", function () {
                    this.value = this.value.replace(/\D/g, "").slice(0, 10);
                });

            /* ---------------------------
               Password Validation
               LIVE FEEDBACK
            ---------------------------- */
            const password = document.getElementById("hospital-password");
            const confirmPassword = document.getElementById("hospital-confirm-password");

            password.setAttribute("minlength", "6");
            password.setAttribute("maxlength", "10");

            password.addEventListener("input", function () {
                if (this.value.length < 6) {
                    this.classList.add("is-invalid");
                    this.classList.remove("is-valid");
                } else if (this.value.length > 10) {
                    this.value = this.value.slice(0, 10);
                } else {
                    this.classList.remove("is-invalid");
                    this.classList.add("is-valid");
                }
            });

            confirmPassword.addEventListener("input", function () {
                if (this.value !== password.value) {
                    this.classList.add("is-invalid");
                    this.classList.remove("is-valid");
                } else {
                    this.classList.remove("is-invalid");
                    this.classList.add("is-valid");
                }
            });

        });
    </script>



</body>

</html>
