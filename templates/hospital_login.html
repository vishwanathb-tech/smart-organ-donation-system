<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5568d3 0%, #683a92 100%);
        }

        h2 {
            color: #333;
            font-weight: bold;
        }

        .form-label {
            color: #555;
            font-weight: 500;
        }

        .hospital-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-body p-5">

                        <div class="text-center">
                            <div class="hospital-icon">🏥</div>
                            <h2>Hospital Login</h2>
                            <p class="text-muted">Access your hospital dashboard</p>
                        </div>

                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                        {% endif %}
                        {% endwith %}

                        <form method="POST" action="/hospital/login" novalidate>

                            <div class="mb-3">
                                <label class="form-label">📱 Mobile Number</label>
                                <input id="login-mobile" type="tel" name="mobile" class="form-control form-control-lg"
                                    placeholder="10-digit mobile number" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">🔐 Password</label>
                                <input id="login-password" type="password" name="password"
                                    class="form-control form-control-lg" placeholder="6–10 character password" required>
                            </div>

                            <button id="login-btn" type="submit" class="btn btn-primary w-100 py-2 mb-3">
                                Login
                            </button>

                        </form>

                        <hr class="my-4">

                        <p class="text-center text-muted">
                            New hospital?
                            <a href="/hospital/register" class="text-primary fw-bold">Register here</a>
                        </p>

                        <p class="text-center text-muted">
                            <a href="/" class="text-secondary">Back to Home</a>
                        </p>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const mobile = document.getElementById("login-mobile");
            const password = document.getElementById("login-password");
            const btn = document.getElementById("login-btn");

            /* -----------------------
               Mobile: 10 digits only
            ------------------------ */
            mobile.addEventListener("input", function () {
                this.value = this.value.replace(/\D/g, "").slice(0, 10);

                if (this.value.length === 10) {
                    this.classList.add("is-valid");
                    this.classList.remove("is-invalid");
                } else {
                    this.classList.add("is-invalid");
                    this.classList.remove("is-valid");
                }
                toggleButton();
            });

            /* -----------------------
               Password: 6–10 chars
            ------------------------ */
            password.addEventListener("input", function () {
                if (this.value.length < 6 || this.value.length > 10) {
                    this.classList.add("is-invalid");
                    this.classList.remove("is-valid");
                } else {
                    this.classList.remove("is-invalid");
                    this.classList.add("is-valid");
                }
                toggleButton();
            });

            /* -----------------------
               Disable button if invalid
            ------------------------ */
            function toggleButton() {
                btn.disabled = !(mobile.value.length === 10 &&
                    password.value.length >= 6 &&
                    password.value.length <= 10);
            }

            btn.disabled = true;
        });
    </script>

</body>

</html>
