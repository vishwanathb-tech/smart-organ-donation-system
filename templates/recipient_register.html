{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="col-md-8 mx-auto card-shadow p-4">
        <h3 class="text-center mb-4 fw-bold text-light">
            🤝 Register as Recipient
        </h3>

        <form method="post" onsubmit="return validateForm()">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="recipient-name">Full Name</label>
                    <input id="recipient-name" name="patient_name" type="text" class="form-control" required
                        pattern="[A-Za-z\s]{3,50}" placeholder="Enter your full name"
                        title="Only letters and spaces allowed (3–50 characters)"
                        oninput="this.value = this.value.replace(/\b\w/g, c => c.toUpperCase())">
                </div>


                <div class="col-md-6 mb-3">
                    <label class="form-label text-light" for="recipient-mobile">Mobile Number</label>
                    <input id="recipient-mobile" name="mobile" type="tel" class="form-control" pattern="[0-9]{10}"
                        maxlength="10" placeholder="10-digit mobile number" required>

                </div>
            </div>

            <div class="row">
                <!-- ✅ Age Field: Only numbers, 3 digits max -->
                <div class="col-md-3 mb-3">
                    <label class="form-label text-light" for="recipient-age">Age</label>
                    <input id="recipient-age" name="age" type="number" min="1" max="120" class="form-control"
                        placeholder="Enter age" required oninput="limitAgeInput(this)">

                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label text-light" for="recipient-blood">Blood Group</label>
                    <select id="recipient-blood" name="blood_group" class="form-select" required>
                        <option value="">Select Blood Group</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>
                    </select>
                </div>

                <div class="col-md-5 mb-3">
                    <label class="form-label text-light" for="recipient-city">City</label>
                    <input id="recipient-city" name="city" class="form-control" placeholder="Enter city" required
                        oninput="capitalizeCity(this)">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-light" for="recipient-gender">Gender</label>
                    <select id="recipient-gender" name="gender" class="form-select" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label text-light" for="recipient-organ">Organ Needed</label>
                    <input id="recipient-organ" name="organ_needed" list="organs" class="form-control"
                        placeholder="e.g., Heart, Kidney" required
                        oninput="this.value = this.value.replace(/\b\w/g, c => c.toUpperCase())">

                    <datalist id="organs">
                        <option value="Heart">
                        <option value="Kidney">
                        <option value="Liver">
                        <option value="Lungs">
                        <option value="Pancreas">
                        <option value="Cornea">
                        <option value="Bone Marrow">
                        <option value="Skin">
                    </datalist>
                </div>



                <!-- ✅ Added Password Field -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="recipient-password">Password</label>
                        <input id="recipient-password" name="password" type="password" class="form-control" required
                            minlength="6" maxlength="20" placeholder="Enter password"
                            title="Password must be 6–20 characters long">
                    </div>
                </div>
                <!-- ✅ End Password Field -->

                <div class="mb-3">
                    <label class="form-label text-light" for="recipient-notes">Additional Notes</label>
                    <textarea id="recipient-notes" name="notes" class="form-control" rows="3"
                        placeholder="Optional message for doctors or coordinators"></textarea>
                </div>

                <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                    Submit Request
                </button>
        </form>
    </div>

    <!-- 🔗 Login link for existing recipients -->
    <div class="text-center mt-3">
        <small class="text-light">
            Already registered?
            <a href="{{ url_for('recipient_login') }}" class="text-decoration-none text-info fw-semibold">
                Login here
            </a>
        </small>
    </div>
</div>

<script>
    // ✅ Capitalize City (first letter of each word)
    function capitalizeCity(input) {
        let words = input.value.toLowerCase().split(' ');
        input.value = words.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    // ✅ Restrict Age Input: Only numbers, 3 digits max
    function limitAgeInput(input) {
        // Remove non-numeric characters (safety)
        input.value = input.value.replace(/[^0-9]/g, '');
        // Restrict to 3 digits
        if (input.value.length > 3) input.value = input.value.slice(0, 3);
    }

    // ✅ Validate Age and Mobile before submission
    function validateForm() {
        const mobile = document.querySelector('[name="mobile"]').value;
        const age = document.querySelector('[name="age"]').value;

        if (!/^\d{10}$/.test(mobile)) {
            alert("Please enter a valid 10-digit mobile number.");
            return false;
        }

        if (age < 1 || age > 120) {
            alert("Please enter a valid age between 1 and 120.");
            return false;
        }

        return true;
    }
</script>

<!-- ✅ Add your JavaScript here (end of template) -->
<script>
    document.querySelector('input[name="mobile"]').addEventListener('input', function (e) {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
    });
</script>
{% endblock %}
