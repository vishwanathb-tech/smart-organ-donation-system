{% extends 'base.html' %}
{% block content %}

<style>
    /* Center everything perfectly on screen */
    body {
        font-family: "Poppins", sans-serif;
        background: radial-gradient(circle at top right, #0056d2, #001a4d);
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        overflow: hidden;
        flex-direction: column;
        /* keeps alerts and card stacked vertically */
    }

    /* Auth card styles */
    .auth-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(25px);
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        width: 90%;
        /* responsive width */
        max-width: 420px;
        padding: 3rem 2.5rem;
        text-align: center;
        margin: 0 auto;
        /* centers horizontally */
    }

    /* Alert box above card */
    .alert {
        background: #a8e6a3;
        color: #000;
        border-radius: 10px;
        padding: 10px 20px;
        position: relative;
        margin-bottom: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }


    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h2 {
        color: #ffffff;
        font-weight: 700;
        font-size: 1.8rem;
        margin-bottom: 0.3rem;
    }

    p {
        color: #e2e8f0;
        font-size: 0.95rem;
        margin-bottom: 1.8rem;
    }

    .tabs {
        display: flex;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 1.5rem;
    }

    .tab {
        flex: 1;
        border: none;
        background: transparent;
        padding: 0.9rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: 0.3s;
    }

    .tab.active {
        background: #00b4d8;
        color: #fff;
    }

    .progress {
        height: 8px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        overflow: hidden;
        margin-bottom: 1.5rem;
    }

    label {
        font-weight: 600;
        color: #f1f5f9;
        display: block;
        text-align: left;
        margin-bottom: 0.3rem;
    }

    input,
    select {
        width: 100%;
        padding: 0.8rem;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 1rem;
        margin-bottom: 1rem;
        transition: all 0.2s ease;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.7);
    }

    input:focus {
        background: rgba(255, 255, 255, 0.3);
        box-shadow: 0 0 10px rgba(0, 180, 216, 0.5);
    }

    .btn-primary {
        background: #00b4d8;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: 0.3s ease;
    }

    .btn-primary:hover {
        background: #0096c7;
        box-shadow: 0 0 12px rgba(0, 180, 216, 0.5);
        transform: translateY(-1px);
    }

    a {
        color: #00b4d8;
        text-decoration: none;
        font-weight: 500;
    }

    a:hover {
        text-decoration: underline;
    }

    .bg-light-dots {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.08) 0%, transparent 60%),
            radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.06) 0%, transparent 60%);
        z-index: 0;
    }

    /* === Dropdown (Select Role) Styling === */
    select.form-select,
    select.custom-select {
        background-color: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #ffffff;
        /* white text */
        font-weight: 500;
        border-radius: 8px;
        padding: 10px;
        width: 100%;
        appearance: none;
        /* remove native arrow style */
        backdrop-filter: blur(10px);
    }

    /* === Dropdown arrow (optional for a modern look) === */
    select.form-select:focus {
        border-color: #00bcd4;
        box-shadow: 0 0 8px rgba(0, 188, 212, 0.6);
        outline: none;
    }

    /* === Dropdown options visible === */
    select option {
        background-color: #013a63;
        /* dark background for dropdown list */
        color: #ffffff;
        /* white text */
        font-weight: 500;
    }

    /* Highlighted option while hovering */
    select option:hover,
    select option:focus {
        background-color: #00bcd4;
        color: #fff;
    }
</style>

<div class="bg-light-dots"></div>

<div class="auth-card">
    <h2>💙 Save Life</h2>
    <p>Join our lifesaving community</p>

    <!-- REGISTER ONLY -->
    <form id="register-form">
        <div class="text-start">
            <label for="role">Register As *</label>
            <select id="role" name="role" required>
                <option value="" disabled selected>Select your role</option>
                <option value="hospital">Hospital</option>
                <option value="recipient">Recipient</option>
            </select>
        </div>

        <button type="button" class="btn-primary" id="nextBtn">
            Register
        </button>
    </form>
</div>


<script>
    document.getElementById("nextBtn").addEventListener("click", function () {
        const role = document.getElementById("role").value;

        if (!role) {
            alert("Please select a role to continue.");
            return;
        }

        if (role === "hospital") {
            window.location.href = "{{ url_for('hospital_register') }}";
        }
        else if (role === "recipient") {
            window.location.href = "{{ url_for('recipient_register') }}";
        }
    });
</script>


{% endblock %}
