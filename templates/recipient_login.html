{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="col-md-5 mx-auto card p-4">
        <h3 class="text-center mb-3">❤️ Recipient Login</h3>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input name="mobile" type="text" class="form-control" placeholder="Enter registered mobile"
                    pattern="^[0-9]{10}$" maxlength="10" minlength="10" title="Enter a valid 10-digit mobile number"
                    required>
            </div>
            <!-- ✅ Added Password Field -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input name="password" type="password" class="form-control" placeholder="Enter your password"
                    minlength="6" required>
            </div>

            <button class="btn btn-primary w-100">Login</button>
        </form>
        <div class="text-center mt-3">
            <p>New recipient? <a href="{{ url_for('recipient_register') }}">Register here</a></p>
        </div>
        <p class="text-center mt-2">
            <a href="{{ url_for('forgot_password', role='recipient') }}">Forgot Password?</a>

        </p>
    </div>
</div>

<!-- ✅ Add your JavaScript here (end of template) -->
<script>
    document.querySelector('input[name="mobile"]').addEventListener('input', function (e) {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
    });
</script>
{% endblock %}
