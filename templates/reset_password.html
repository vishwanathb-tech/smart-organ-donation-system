{% extends 'base.html' %}
{% block content %}
<div class="auth-bg">
    <div class="card p-4 shadow-lg border-0 auth-card">
        <div class="text-center mb-3">
            <span class="auth-emoji">🔒</span>
            <h3 class="fw-bold mt-2">Reset Password</h3>
            <p class="auth-desc">Create a new password for your account</p>
        </div>

        <form method="POST" aria-label="Reset password form">
            <div class="mb-3">
                <label for="new_password" class="form-label fw-semibold">New Password</label>
                <input id="new_password" type="password" name="new_password" class="form-control form-control-lg"
                    placeholder="Enter new password" required aria-required="true">
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                <input id="confirm_password" type="password" name="confirm_password"
                    class="form-control form-control-lg" placeholder="Confirm new password" required
                    aria-required="true">
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 btn-gradient btn-rounded">Reset Password</button>
        </form>

        <p class="text-center mt-3 mb-0">
            <a href="{{ url_for('get_started') }}" class="text-decoration-none">← Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
