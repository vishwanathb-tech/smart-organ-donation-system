{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center vh-100"
    style="background: linear-gradient(135deg, #0045b0, #002b7f);">
    <div class="card p-4 shadow-lg border-0" style="max-width: 420px; width: 100%; border-radius: 16px;">

        {% if stage == 'mobile' %}
        <div class="text-center mb-3">
            <span style="font-size: 2rem;">📱</span>
            <h3 class="fw-bold mt-2">Forgot Password</h3>
            <p class="text-muted" style="font-size: 0.95rem;">Enter your registered mobile number to get OTP</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Mobile Number</label>
                <input type="text" name="mobile" class="form-control form-control-lg"
                    placeholder="Enter your registered 10-digit mobile number" pattern="[0-9]{10}" maxlength="10"
                    inputmode="numeric" title="Please enter a valid 10-digit mobile number" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2" style="border-radius: 8px;">Send OTP</button>
        </form>

        {% elif stage == 'otp' %}
        <div class="text-center mb-3">
            <span style="font-size: 2rem;">🔑</span>
            <h3 class="fw-bold mt-2">Verify OTP & Reset Password</h3>
            <p class="text-muted" style="font-size: 0.95rem;">Enter OTP sent to your mobile ({{ mobile }})</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">OTP</label>
                <input type="text" name="otp" class="form-control form-control-lg" placeholder="Enter OTP" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">New Password</label>
                <input type="password" name="new_password" class="form-control form-control-lg"
                    placeholder="Enter new password" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control form-control-lg"
                    placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2" style="border-radius: 8px;">Reset Password</button>
        </form>
        {% endif %}

        <p class="text-center mt-3 mb-0">
            <a href="{{ url_for('get_started') }}" class="text-decoration-none">← Back to Login</a>
        </p>
    </div>
</div>

<!-- ✅ Add your JavaScript here (end of template) -->
<script>
    document.querySelector('input[name="mobile"]').addEventListener('input', function (e) {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
    });
</script>
{% endblock %}
