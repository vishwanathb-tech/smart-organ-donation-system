<!doctype html><html><head><meta charset="utf-8"><title>Audit Logs</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4"><div class="container">
<h2>Audit Logs</h2>
<table class="table table-sm"><thead><tr><th>ID</th><th>User</th><th>Action</th><th>Object</th><th>Extra</th><th>Timestamp</th></tr></thead><tbody>
{% for a in logs %}
<tr><td>{{a.id}}</td><td>{{a.user_id}}</td><td>{{a.action}}</td><td>{{a.object_type}}:{{a.object_id}}</td><td>{{a.extra}}</td><td>{{a.timestamp}}</td></tr>
{% endfor %}
</tbody></table>
</div></body></html>
