<!doctype html><html><head><meta charset="utf-8"><title>Deceased Donor Declaration</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4"><div class="container">
<h2>Deceased Donor Declaration (Next of Kin)</h2>
<p>This form allows the next of kin to confirm organ donation as per donor's declaration or to provide consent.</p>
<form method="POST" action="/donor/consent/submit">
<div class="mb-3"><label>Full name (next of kin)</label><input name="signed_name" class="form-control" required></div>
<div class="mb-3"><label>Relation</label><input name="relation" class="form-control" required></div>
<div class="mb-3"><label>Donor record ID (if known)</label><input name="donor_record" class="form-control"></div>
<div class="mb-3 form-check"><input name="agree" value="yes" class="form-check-input" type="checkbox" id="agree" required><label class="form-check-label" for="agree">I confirm</label></div>
<button class="btn btn-primary" type="submit">Submit Declaration</button>
</form><hr><a href='/'>Home</a></div></body></html>
