{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="col-md-8 mx-auto card p-4">
        <h3>Edit Profile</h3>
        <form method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Name</label>
                    <input name="name" value="{{ donor.name }}" class="form-control" required
                        oninput="this.value = this.value.replace(/\b\w/g, c => c.toUpperCase())">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Age</label>
                    <input type="number" name="age" value="{{ donor.age }}" class="form-control" min="1" max="999"
                        maxlength="3" oninput="if(this.value.length > 3) this.value = this.value.slice(0,3)">
                </div>

                <div class="col-md-3 mb-3">
                    <label>Gender</label>
                    <select name="gender" class="form-select">
                        <option value="Male" {% if donor.gender=='Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if donor.gender=='Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if donor.gender=='Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
            </div>

            <select name="blood_group" class="form-control" required>
                <option value="">Select Blood Group</option>
                {% for bg in ["A+", "A-", "B+", "B-", "O+", "O-", "AB+", "AB-"] %}
                <option value="{{ bg }}" {% if donor.blood_group==bg %}selected{% endif %}>{{ bg }}</option>
                {% endfor %}
            </select>

            <div class="mb-3">
                <label>Organs (comma separated)</label>
                <input name="organs" value="{{ donor.organs }}" class="form-control" oninput="
               this.value = this.value
                   .split(',')
                   .map(item => item.trim().replace(/\b\w/g, c => c.toUpperCase()))
                   .join(', ');
           ">
            </div>


            <div class="col-md-4 mb-3">
                <label>City</label>
                <input name="city" value="{{ donor.city }}" class="form-control"
                    oninput="this.value = this.value.replace(/\b\w/g, c => c.toUpperCase())">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input name="password" type="password" class="form-control" placeholder="Enter your password"
                    minlength="6" required>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="available" {% if donor.available %}checked{% endif
                    %}>
                <label class="form-check-label">Available for donation</label>
            </div>

            <button class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
